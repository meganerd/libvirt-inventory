include:
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml

stages:
  - test
  - build
  - security

variables:
  GOPATH: ${CI_PROJECT_DIR}/.go
  GOFLAGS: "-mod=readonly"

default:
  image: golang:1.26
  tags:
    - docker
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/

test:
  stage: test
  script:
    - go build ./...  # no tests yet — verify compilation

lint:
  stage: test
  image: golangci/golangci-lint:v2.11
  script:
    - golangci-lint run --new-from-rev=${CI_MERGE_REQUEST_DIFF_BASE_SHA:-HEAD~1} ./...
    - golangci-lint run --new=false ./... || true

build:
  stage: build
  script:
    - go build -ldflags "-X main.version=${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}" -o lvi ./cmd/lvi/
  artifacts:
    paths:
      - lvi
    expire_in: 1 week
  needs:
    - test
    - lint

security:govulncheck:
  stage: security
  image: golang:1.26
  script:
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    - govulncheck ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG

security:nancy:
  stage: security
  image: golang:1.26
  script:
    - go list -json -deps ./... > deps.json
    - go install github.com/sonatype-nexus-community/nancy@latest
    - $GOPATH/bin/nancy sleuth < deps.json
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG

security:sbom:
  stage: security
  image: golang:1.26
  script:
    - go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
    - $GOPATH/bin/cyclonedx-gomod app -json -output sbom.json
  artifacts:
    paths:
      - sbom.json
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG
