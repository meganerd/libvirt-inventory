stages:
  - test
  - build

variables:
  GOPATH: ${CI_PROJECT_DIR}/.go
  GOFLAGS: "-mod=readonly"

default:
  image: golang:1.26
  tags:
    - docker
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/

test:
  stage: test
  script:
    - go build ./...  # no tests yet — verify compilation

lint:
  stage: test
  image: golangci/golangci-lint:v2.11
  script:
    - golangci-lint run --new-from-rev=${CI_MERGE_REQUEST_DIFF_BASE_SHA:-HEAD~1} ./...
    - golangci-lint run --new=false ./... || true

build:
  stage: build
  script:
    - go build -ldflags "-X main.version=${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}" -o lvi ./cmd/lvi/
  artifacts:
    paths:
      - lvi
    expire_in: 1 week
  needs:
    - test
    - lint
