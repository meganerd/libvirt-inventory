version: "2"
linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosec
    - ineffassign
    - depguard
    - gomoddirectives
  settings:
    errcheck:
      exclude-functions:
        - (*os.File).Close
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Print
        - fmt.Println
        - fmt.Printf
    gosec:
      excludes:
        - G304
    depguard:
      rules:
        main:
          list-mode: lax
          deny:
            - pkg: "crypto/md5"
              desc: "MD5 is cryptographically broken — use crypto/sha256"
            - pkg: "crypto/sha1"
              desc: "SHA-1 is cryptographically broken — use crypto/sha256"
            - pkg: "io/ioutil"
              desc: "Deprecated since Go 1.16 — use io and os packages"
          allow:
            - $gostd
            - golang.org/x/
            - github.com/spf13/cobra
            - github.com/spf13/pflag
            - github.com/inconshreveable/mousetrap
            - gopkg.in/yaml.v3
    gomoddirectives:
      replace-local: true
      replace-allow-list: []
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      - text: "Error return value of .*.Close"
        linters:
          - errcheck
