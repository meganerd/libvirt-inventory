# lvi configuration
# Copy to config.yaml and edit for your environment.

hypervisors:
  - name: vmh01
    uri: "qemu+ssh://root@vmh01/system"
  - name: vmh02
    uri: "qemu+ssh://root@vmh02/system"
  - name: vmh03
    uri: "qemu+ssh://root@vmh03/system"
  # - name: pve01
  #   uri: "qemu+ssh://root@pve01/system"

# Directory for snapshots and generated HCL
output_dir: "./inventory"

# Default values for VM creation (lvi create)
# CLI flags override these values.
defaults:
  vcpus: 2
  memory_mib: 2048
  disk_size_gb: 20
  base_image_url: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
  install_user: "install"
  pool: "default"
  network: "default"
